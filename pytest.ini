[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    basic: Basic CRUD operations
    integrity: Data integrity tests (foreign keys, constraints)
    quality: Data quality tests (emails, duplicates, ranges)
    performance: Query performance and optimization tests
    schema: Schema structure validation tests
    factories: Test data factory tests
    
    # Severity markers
    critical: Critical issues that must pass
    high: High severity issues
    medium: Medium severity issues
    low: Low severity issues
    
    # Category markers
    sql_injection: SQL injection tests
    foreign_keys: Foreign key integrity
    constraints: Database constraints
    duplicates: Duplicate detection
    email: Email validation
    ranges: Value range validation
    optimization: Query optimization
    n_plus_one: N+1 query detection

# Console output
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO